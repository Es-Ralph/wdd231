content="Rapheal Akwasi Agyapong">

<link rel="icon"
href="images/favicon.ico">

href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
rel="stylesheet">

<meta property="og:title"
content="Join the Accra Chamber of Commerce Today">

<meta property="og:description"
content="Become a member and grow your business network in Accra today.">

<meta property="og:image"
content="https://es-ralph.github.io/wdd231/chamber/images/og-image.webp">

<body>

<header>

<nav>

<a href="index.html">Home</a>

<a href="directory.html">Directory</a>

<a href="join.html">Join</a>

</nav>

</header>

<main>

<h1>Join the Chamber</h1>

<div class="container">

<form method="get"
action="thankyou.html">

<label>

First Name

<input
type="text"
name="fname"
required
title="Enter your first name"
autocomplete="given-name"
placeholder="John">

</label>

<label>

Last Name

<input
type="text"
name="lname"
required
title="Enter your last name"
autocomplete="family-name"
placeholder="Doe">

</label>

<label>

Organization Title

<input
type="text"
name="orgtitle"
pattern="[A-Za-z\s\-]{7,}"
title="At least 7 alphabetic characters"
autocomplete="organization-title"
placeholder="CEO, Manager">

</label>

<label>

Email

<input
type="email"
name="email"
required
title="Enter your email address"
autocomplete="email"
placeholder="example@email.com">

</label>

<label>

Phone

<input
type="tel"
name="phone"
required
title="Enter your mobile phone number"
autocomplete="tel"
placeholder="123-456-7890">

</label>

<label>

Business Name

<input
type="text"
name="business"
required
title="Enter your organization name"
autocomplete="organization"
placeholder="Business Name">

</label>

<label>

Membership Level

<select
name="membership"
required
title="Choose membership level">

<option value="">Select...</option>
<option value="np">NP Membership</option>
<option value="bronze">Bronze Membership</option>
<option value="silver">Silver Membership</option>
<option value="gold">Gold Membership</option>

</select>

</label>

<label>

Description

<textarea
name="description"
title="Describe your organization"></textarea>

</label>

<input
type="hidden"
id="timestamp"
name="timestamp">

<button type="submit">

Submit Application

</button>

</form>

<div class="cards">

<div class="card">

<h3>NP Membership</h3>

<button data-modal="np">

Benefits

</button>

</div>

<div class="card">

<h3>Bronze Membership</h3>

<button data-modal="bronze">

Benefits

</button>

</div>

<div class="card">

<h3>Silver Membership</h3>

<button data-modal="silver">

Benefits

</button>

</div>

<div class="card">

<h3>Gold Membership</h3>

<button data-modal="gold">

Benefits

</button>

</div>

</div>

</div>

</main>

<footer>

<p>&copy; 2026 Accra Chamber</p>

</footer>

<dialog id="np">

<p>No-cost membership benefits.</p>

<button class="close">

Close

</button>

</dialog>

<dialog id="bronze">

<p>Basic advertising opportunities.</p>

<button class="close">

Close

</button>

</dialog>

<dialog id="silver">

<p>Networking events and discounts.</p>

<button class="close">

Close

</button>

</dialog>

<dialog id="gold">

<p>Premium exposure and exclusive business benefits.</p>

<button class="close">

Close

</button>

</dialog>

</body>
</html>

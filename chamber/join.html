<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Join Accra Chamber of Commerce</title>

  <meta name="description" content="Join the Accra Chamber of Commerce to access business opportunities, events, and professional growth.">
  <meta name="author" content="Rapheal Akwasi Agyapong">

  <!-- Favicon -->
  <link rel="icon" href="images/favicon.ico">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Open Graph -->
  <meta property="og:title" content="Join the Accra Chamber of Commerce Today">
  <meta property="og:description" content="Become a member and grow your business network in Accra today.">
  <meta property="og:image" content="https://via.placeholder.com/1200x630">
  <meta property="og:url" content="https://es-ralph.github.io/wdd231/chamber/join.html">

  <!-- CSS -->
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/join.css">

  <!-- JS -->
  <script src="scripts/join.js" defer></script>
</head>

<body>

<header>
  <nav>
    <a href="index.html">Home</a> |
    <a href="directory.html">Directory</a> |
    <a href="join.html">Join</a>
  </nav>
</header>

<main>
  <!-- ✅ FIXED H1 (inside main) -->
  <h1>Join the Chamber</h1>

  <div class="container">

    <form method="get" action="thankyou.html">

      <label>First Name
        <input type="text" name="fname" required title="First name" autocomplete="given-name">
      </label>

      <label>Last Name
        <input type="text" name="lname" required title="Last name" autocomplete="family-name">
      </label>

      <label>Organization Title
        <input type="text" name="orgtitle"
          pattern="^[A-Za-z\s\-]{7,}$"
          title="At least 7 characters"
          autocomplete="organization-title">
      </label>

      <label>Email
        <input type="email" name="email" required
          autocomplete="email"
          placeholder="example@email.com">
      </label>

      <label>Phone
        <input type="tel" name="phone" required autocomplete="tel">
      </label>

      <label>Business Name
        <input type="text" name="business" required autocomplete="organization">
      </label>

      <label>Membership Level
        <select name="membership" required>
          <option value="">Select...</option>
          <option value="np">NP Membership</option>
          <option value="bronze">Bronze</option>
          <option value="silver">Silver</option>
          <option value="gold">Gold</option>
        </select>
      </label>

      <label>Description
        <textarea name="description"></textarea>
      </label>

      <input type="hidden" id="timestamp" name="timestamp">

      <input type="submit" value="Submit Application">

    </form>

    <!-- ✅ CARDS -->
    <div class="cards">

      <div class="card">
        <h3>NP Membership</h3>
        <button data-modal="np">Benefits</button>
      </div>

      <div class="card">
        <h3>Bronze</h3>
        <button data-modal="bronze">Benefits</button>
      </div>

      <div class="card">
        <h3>Silver</h3>
        <button data-modal="silver">Benefits</button>
      </div>

      <div class="card">
        <h3>Gold</h3>
        <button data-modal="gold">Benefits</button>
      </div>

    </div>

  </div>
</main>

<footer>
  <p>&copy; 2026 Accra Chamber</p>
</footer>

<!-- ✅ MODALS -->
<dialog id="np"><p>No cost membership.</p><button class="close">Close</button></dialog>
<dialog id="bronze"><p>Basic advertising.</p><button class="close">Close</button></dialog>
<dialog id="silver"><p>Events and discounts.</p><button class="close">Close</button></dialog>
<dialog id="gold"><p>Premium benefits.</p><button class="close">Close</button></dialog>

</body>
</html>
``
